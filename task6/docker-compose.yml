services:
  postgres:
    image: postgres:13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmuser_password
      POSTGRES_DB: mattermost
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/db/var/lib/postgresql/data:/var/lib/postgresql/data
    networks:
      - mattermost

  mattermost:
    image: mattermost/mattermost-team-edition:10.11
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:mmuser_password@postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
    ports:
      - "8065:8065"
    volumes:
      - ./volumes/mattermost/config:/mattermost/config
      - ./volumes/mattermost/data:/mattermost/data
      - ./volumes/mattermost/logs:/mattermost/logs
      - ./volumes/mattermost/plugins:/mattermost/plugins
      - ./volumes/mattermost/client-plugins:/mattermost/client/plugins
    networks:
      - mattermost

  mattermost-bot:
    build:
      context: ./volumes/bot
      dockerfile: ../../Dockerfile
    restart: unless-stopped
    depends_on:
      - mattermost
    environment:
      - MATTERMOST_URL=http://mattermost
      - MATTERMOST_PORT=8065
      - BOT_TOKEN=o7xdco3147fi9nsqnb4qns9rtr
      - BOT_TEAM=malwarecentral
      - SSL_VERIFY=False
    volumes:
      - ./volumes/bot:/app
    networks:
      - mattermost

networks:
  mattermost:
    driver: bridge